# Deploy delhi-dashboard to GitHub Pages (works with Source = GitHub Actions)
name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build dashboard data
        run: |
          pip install pandas -q
          if [ -f "Delhi Air Quality Time Series Dataset(01-01-2025 to 15-05-2026).csv" ]; then
            python3 scripts/build_aqi_data.py
          else
            echo "New 2025–2026 CSV not in CI — using committed delhi_aqi.json"
          fi

      - name: Prepare site bundle
        run: |
          rm -rf _site
          cp -r delhi-dashboard _site
          cp -r delhi-dashboard/data _site/data 2>/dev/null || true
          test -f data/delhi_aqi.json && cp data/delhi_aqi.json _site/data/
          touch _site/.nojekyll
          echo "Site files:" && find _site -type f | head -20

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
